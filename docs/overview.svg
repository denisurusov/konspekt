<svg xmlns="http://www.w3.org/2000/svg" width="960" viewBox="0 0 960 817" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>konspekt — how it works</title>
<desc>konspekt keeps a portable, human-readable record of a project's evolving state across generative-AI conversations and platforms: a typed knowledge graph on GitHub, mutated by human-authority verbs through a propose-accept loop, where every atom cites a verbatim, content-addressed source excerpt.</desc>
<style>
  :root{
    --primary:#201f1d;--secondary:#5f5e5a;--muted:#8a8980;
    --surface:#ffffff;--page:#faf9f5;--border:#e3e1d8;
    --accent:#185fa5;--accent-bg:#e6f1fb;--accent-border:#9cc4ec;
    --tag-bg:#f4f2ec;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --primary:#eceae1;--secondary:#b4b2a9;--muted:#8a8980;
      --surface:#26261f;--page:#1c1c17;--border:#40403a;
      --accent:#85b7eb;--accent-bg:#123350;--accent-border:#2e6699;
      --tag-bg:#2f2f28;
    }
  }
  .primary{fill:var(--primary)} .secondary{fill:var(--secondary)} .muted{fill:var(--muted)}
  .accent{fill:var(--accent)}
  .h{font-weight:600} .m{font-weight:500}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
  a{cursor:pointer}
</style>
<rect x="0" y="0" width="960" height="817" rx="0" fill="var(--page)"/>
<rect x="40" y="30" width="880" height="104" rx="14" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<rect x="62" y="52" width="4" height="60" rx="2" fill="var(--accent)"/>
<text x="82" y="60" class="accent h" font-size="13" letter-spacing="1.4">KONSPEKT</text>
<text x="82" y="88" class="primary m" font-size="19">A portable, human-readable record of a project’s evolving state across</text>
<text x="82" y="112" class="primary m" font-size="19">generative-AI conversations and platforms.</text>
<rect x="40.0" y="156" width="117.0" height="34" rx="17" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="98.5" y="178.0" text-anchor="middle" class="accent" font-size="14">Conversation</text>
<path d="M167.0 168.0 l6 5 l-6 5" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="183.0" y="156" width="191.2" height="34" rx="17" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="278.7" y="178.0" text-anchor="middle" class="accent" font-size="14">Claude proposes — verb</text>
<path d="M384.3 168.0 l6 5 l-6 5" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="400.3" y="156" width="124.5" height="34" rx="17" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="462.5" y="178.0" text-anchor="middle" class="accent" font-size="14">Human accepts</text>
<path d="M534.7 168.0 l6 5 l-6 5" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="550.7" y="156" width="146.7" height="34" rx="17" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="624.1" y="178.0" text-anchor="middle" class="accent" font-size="14">Commit to GitHub</text>
<rect x="40.0" y="212" width="430.0" height="178" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
<rect x="60" y="234" width="9" height="9" rx="2.5" fill="var(--accent)"/>
<text x="78" y="242" class="primary m" font-size="15.5">Data model — graph</text>
<text x="450.0" y="242" text-anchor="end" class="muted mono" font-size="12">01</text>
<text x="60" y="266" class="secondary" font-size="13">A typed knowledge graph. Node kinds and entity</text>
<text x="60" y="285" class="secondary" font-size="13">types wired through a single typed edge table.</text>
<text x="60" y="304" class="secondary" font-size="13">Inventories are queries over edges — never lists.</text>
<rect x="60.0" y="334.0" width="44.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="82.4" y="349.0" text-anchor="middle" class="secondary mono" font-size="12">goal</text>
<rect x="111.8" y="334.0" width="109.6" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="166.6" y="349.0" text-anchor="middle" class="secondary mono" font-size="12">investigation</text>
<rect x="228.4" y="334.0" width="88.0" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="272.4" y="349.0" text-anchor="middle" class="secondary mono" font-size="12">experiment</text>
<rect x="323.4" y="334.0" width="52.0" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="349.4" y="349.0" text-anchor="middle" class="secondary mono" font-size="12">topic</text>
<rect x="382.4" y="334.0" width="44.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="404.8" y="349.0" text-anchor="middle" class="secondary mono" font-size="12">task</text>
<rect x="60.0" y="359.0" width="44.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="82.4" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">note</text>
<rect x="490.0" y="212" width="430.0" height="178" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
<rect x="510.0" y="234" width="9" height="9" rx="2.5" fill="var(--accent)"/>
<text x="528.0" y="242" class="primary m" font-size="15.5">Verbs — commands</text>
<text x="900.0" y="242" text-anchor="end" class="muted mono" font-size="12">02</text>
<text x="510.0" y="266" class="secondary" font-size="13">Human-authority verbs. Claude proposes, the human</text>
<text x="510.0" y="285" class="secondary" font-size="13">accepts; self-acceptance is never permitted. An</text>
<text x="510.0" y="304" class="secondary" font-size="13">accepted verb lands as review: accepted.</text>
<rect x="510.0" y="359.0" width="37.6" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="528.8" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">pin</text>
<rect x="554.6" y="359.0" width="73.6" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="591.4" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">validate</text>
<rect x="635.2" y="359.0" width="59.2" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="664.8" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">refute</text>
<rect x="701.4" y="359.0" width="66.4" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="734.6" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">resolve</text>
<rect x="774.8" y="359.0" width="66.4" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="808.0" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">abandon</text>
<rect x="848.2" y="359.0" width="44.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="870.6" y="374.0" text-anchor="middle" class="secondary mono" font-size="12">lift</text>
<rect x="40.0" y="410" width="430.0" height="178" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
<rect x="60" y="432" width="9" height="9" rx="2.5" fill="var(--accent)"/>
<text x="78" y="440" class="primary m" font-size="15.5">Provenance — citations</text>
<text x="450.0" y="440" text-anchor="end" class="muted mono" font-size="12">03</text>
<text x="60" y="464" class="secondary" font-size="13">Every atom cites its source. Verbatim excerpts from</text>
<text x="60" y="483" class="secondary" font-size="13">both sides of the exchange, content-addressed by git</text>
<text x="60" y="502" class="secondary" font-size="13">blob SHA. A paraphrase would be an atom in disguise.</text>
<rect x="60.0" y="532.0" width="95.2" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="107.6" y="547.0" text-anchor="middle" class="secondary mono" font-size="12">contentHash</text>
<rect x="162.2" y="532.0" width="80.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="202.6" y="547.0" text-anchor="middle" class="secondary mono" font-size="12">sourceRef</text>
<rect x="250.0" y="532.0" width="116.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="308.4" y="547.0" text-anchor="middle" class="secondary mono" font-size="12">conversationId</text>
<rect x="60.0" y="557.0" width="80.8" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="100.4" y="572.0" text-anchor="middle" class="secondary mono" font-size="12">timestamp</text>
<rect x="490.0" y="410" width="430.0" height="178" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
<rect x="510.0" y="432" width="9" height="9" rx="2.5" fill="var(--accent)"/>
<text x="528.0" y="440" class="primary m" font-size="15.5">GitHub — backend</text>
<text x="900.0" y="440" text-anchor="end" class="muted mono" font-size="12">04</text>
<text x="510.0" y="464" class="secondary" font-size="13">The store is the repo. Atomic multi-file commits,</text>
<text x="510.0" y="483" class="secondary" font-size="13">blob SHA as content hash, human-readable files.</text>
<text x="510.0" y="502" class="secondary" font-size="13">Distribution is a projection of root, never a copy.</text>
<rect x="510.0" y="557.0" width="59.2" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="539.6" y="572.0" text-anchor="middle" class="secondary mono" font-size="12">nodes/</text>
<rect x="576.2" y="557.0" width="59.2" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="605.8" y="572.0" text-anchor="middle" class="secondary mono" font-size="12">edges/</text>
<rect x="642.4" y="557.0" width="73.6" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="679.2" y="572.0" text-anchor="middle" class="secondary mono" font-size="12">sources/</text>
<rect x="723.0" y="557.0" width="109.6" height="21" rx="5" fill="var(--tag-bg)" stroke="var(--border)" stroke-width="1"/>
<text x="777.8" y="572.0" text-anchor="middle" class="secondary mono" font-size="12">atomic commit</text>
<rect x="40" y="610" width="880" height="92" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
<rect x="60" y="632" width="9" height="9" rx="2.5" fill="var(--accent)"/>
<text x="78" y="640" class="primary m" font-size="15.5">Traceability chain</text>
<text x="900" y="640" text-anchor="end" class="muted" font-size="12">every change walks back to a citation</text>
<rect x="60.0" y="655.0" width="111.9" height="30" rx="15" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="115.9" y="675.0" text-anchor="middle" class="accent" font-size="13.5">claim / node</text>
<path d="M179.9 666.0 l6 6 l-6 6" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="195.9" y="655.0" width="54.6" height="30" rx="15" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="223.2" y="675.0" text-anchor="middle" class="accent" font-size="13.5">edge</text>
<path d="M258.5 666.0 l6 6 l-6 6" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="274.5" y="655.0" width="133.3" height="30" rx="15" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="341.1" y="675.0" text-anchor="middle" class="accent" font-size="13.5">verbatim source</text>
<path d="M415.8 666.0 l6 6 l-6 6" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="431.8" y="655.0" width="83.2" height="30" rx="15" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="473.4" y="675.0" text-anchor="middle" class="accent" font-size="13.5">blob SHA</text>
<path d="M523.0 666.0 l6 6 l-6 6" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="539.0" y="655.0" width="126.2" height="30" rx="15" fill="var(--accent-bg)" stroke="var(--accent-border)" stroke-width="1"/>
<text x="602.1" y="675.0" text-anchor="middle" class="accent" font-size="13.5">commit history</text>
