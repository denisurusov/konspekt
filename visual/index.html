<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>konspekt · context explorer</title>
<!--
  konspekt visual — context explorer (v1, read-only)

  Loads data/snapshot.js (a pure function of the instance/ tree) and renders
  the decomposes DAG with Cytoscape.js: goals at the top, tasks at the bottom.
  It starts collapsed to the root goals; click a node to expand it — revealing
  its decomposes children and its satellites (concepts via `mentions`,
  noteworthy via `notes`, artifacts via `produces`) — and the dagre layout
  reflows to make room. Click again to collapse. Click anything for detail.
  The problems panel surfaces the conformance check baked by the build.

  Rendering, pan/zoom, fit, hit-testing and the layered layout are all owned by
  Cytoscape.js + cytoscape-dagre (vendored under ./vendor, no CDN, no build).
  Modern browsers block <script src> over file://, so view it through a local
  static server (any will do):
      node build/serve.mjs        # then open http://localhost:8777/
  No writes. Time / status / review are not yet encoded as visual channels.
-->
<!--suppress CssUnusedSymbol, CssNonIntegerLengthInPixels -->
<style>
  :root {
    --bg: #fbfaf8;
    --panel: #ffffff;
    --ink: #1c1b19;
    --muted: #6c6a66;
    --faint: #908d88;
    --line: #e4e1db;
    --line-strong: #cfccc5;
    --edge: #c4c0b8;
    --sel: #b4530a;
    --goal: #4f46e5;
    --goal-bg: #eef0ff;
    --investigation: #0f766e;
    --investigation-bg: #e6f4f1;
    --task: #b45309;
    --task-bg: #fbf0e2;
    --concept: #7c3aed;
    --concept-bg: #f3edfd;
    --noteworthy: #be123c;
    --noteworthy-bg: #fdecef;
    --artifact: #1d4ed8;
    --artifact-bg: #e8effc;
    --apex: #3f3c37;
    font-synthesis: none;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.45; overflow: hidden;
  }
  #app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto 1fr; height: 100vh; }
  header {
    grid-column: 1 / 3; display: flex; align-items: center; gap: 14px;
    padding: 9px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header .brand { font-weight: 650; letter-spacing: .2px; }
  header .brand span { color: var(--muted); font-weight: 400; }
  header .goal { color: var(--muted); font-size: 12.5px; max-width: 46ch; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  header .spacer { flex: 1; }
  .ctrl {
    font: inherit; font-size: 12.5px; color: var(--ink); background: var(--panel);
    border: 1px solid var(--line-strong); border-radius: 7px; padding: 5px 10px;
    cursor: pointer; user-select: none;
  }
  .ctrl:hover { background: #f4f2ee; }
  .ctrl.on { background: #efece6; border-color: var(--faint); }
  #search {
    font: inherit; font-size: 12.5px; padding: 5px 9px; width: 180px;
    border: 1px solid var(--line-strong); border-radius: 7px; background: var(--panel);
  }
  #search:focus { outline: 2px solid var(--goal-bg); border-color: var(--goal); }
  #stage { position: relative; overflow: hidden; background:
    radial-gradient(circle at 1px 1px, #ece9e3 1px, transparent 0) 0 0 / 26px 26px var(--bg); }
  #cy { position: absolute; inset: 0; }
  /* right panel */
  aside { grid-row: 2; grid-column: 2; border-left: 1px solid var(--line); background: var(--panel);
    display: flex; flex-direction: column; min-height: 0; }
  .tabs { display: flex; border-bottom: 1px solid var(--line); }
  .tab { flex: 1; text-align: center; padding: 9px 6px; font-size: 12.5px; cursor: pointer; color: var(--muted); }
  .tab.on { color: var(--ink); font-weight: 600; box-shadow: inset 0 -2px 0 var(--sel); }
  .tab .count { display: inline-block; min-width: 16px; padding: 0 4px; margin-left: 4px;
    border-radius: 9px; font-size: 10.5px; background: #efece6; color: var(--muted); }
  .tab .count.err { background: var(--noteworthy-bg); color: var(--noteworthy); }
  .panebody { overflow: auto; padding: 14px 15px; min-height: 0; }
  .empty { color: var(--faint); font-size: 13px; padding-top: 20px; text-align: center; }
  .d-kicker { font-size: 10px; letter-spacing: .7px; text-transform: uppercase; color: var(--faint); }
  .d-title { font-size: 16px; font-weight: 650; margin: 2px 0 8px; line-height: 1.25; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
  .chip { font-size: 10.5px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--line);
    color: var(--muted); background: #faf8f4; }
  .chip.k { border: none; color: #fff; }
  .d-body { font-size: 13px; color: #34322e; white-space: normal; }
  .d-body p { margin: 0 0 8px; }
  .d-body code { background: #f1efe9; padding: 1px 4px; border-radius: 4px; font-size: 12px; }
  .d-sec { margin-top: 14px; }
  .d-sec h4 { margin: 0 0 6px; font-size: 11px; letter-spacing: .4px; text-transform: uppercase; color: var(--faint); }
  .erow { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-size: 12.5px; }
  .erow .ek { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--faint);
    min-width: 74px; }
  .erow a { color: var(--ink); text-decoration: none; border-bottom: 1px dotted var(--line-strong); cursor: pointer; }
  .erow a:hover { border-bottom-color: var(--sel); color: var(--sel); }
  .meta-kv { font-size: 12px; color: var(--muted); }
  .meta-kv b { color: var(--ink); font-weight: 600; }
  .prob { border: 1px solid var(--line); border-left-width: 3px; border-radius: 6px;
    padding: 8px 10px; margin-bottom: 8px; font-size: 12.5px; }
  .prob.error { border-left-color: var(--noteworthy); }
  .prob.warning { border-left-color: var(--task); }
  .prob .code { font-weight: 600; font-size: 11px; letter-spacing: .3px; }
  .prob.error .code { color: var(--noteworthy); }
  .prob.warning .code { color: var(--task); }
  .prob .msg { color: #44413c; margin-top: 2px; }
  .prob .ref { color: var(--goal); cursor: pointer; }
  .legend { position: absolute; left: 12px; bottom: 12px; background: rgba(255,255,255,.92);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--muted); }
  .legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .legend .sw { width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(0,0,0,.15); }
  .hint { position: absolute; right: 12px; bottom: 12px; font-size: 11px; color: var(--faint); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">konspekt <span>· context explorer</span></div>
    <div class="goal" id="projectGoal"></div>
    <div class="spacer"></div>
    <input id="search" placeholder="search id / label…" aria-label="search nodes by id or label" autocomplete="off" />
    <button class="ctrl" id="btnExpand">Expand all</button>
    <button class="ctrl" id="btnCollapse">Collapse</button>
    <button class="ctrl" id="btnFit">Fit</button>
  </header>

  <div id="stage">
    <div id="cy"></div>
    <div class="legend" id="legend"></div>
    <div class="hint">scroll to zoom · drag to pan · click a node to expand</div>
  </div>

  <aside>
    <div class="tabs">
      <div class="tab on" data-tab="detail">Detail</div>
      <div class="tab" data-tab="problems">Problems <span class="count" id="probCount">0</span></div>
    </div>
    <div class="panebody" id="detailPane"><div class="empty">Select a node to inspect it.</div></div>
    <div class="panebody" id="problemsPane" style="display:none"></div>
  </aside>
</div>

<script src="./vendor/cytoscape.min.js"></script>
<script src="./vendor/dagre.min.js"></script>
<script src="./vendor/cytoscape-dagre.js"></script>
<script src="./data/snapshot.js"></script>
<script>
(function () {
  "use strict";
  const fail = (m) => { document.body.innerHTML = "<p style='padding:20px'>" + m + "</p>"; };
  const K = window.__KONSPEKT__;
  if (!K) return fail("data/snapshot.js failed to load. Run <code>node build/snapshot.mjs</code> and serve over http (see build/serve.mjs).");
  if (!window.cytoscape) return fail("vendor/cytoscape.min.js failed to load. Serve this folder over http (file:// blocks scripts).");
  if (window.cytoscapeDagre) cytoscape.use(window.cytoscapeDagre);

  // ---------- concrete palette (Cytoscape renders to canvas; CSS vars don't apply there) ----------
  const C = {
    goal:          { ink: "#4f46e5", bg: "#eef0ff" },
    investigation: { ink: "#0f766e", bg: "#e6f4f1" },
    task:          { ink: "#b45309", bg: "#fbf0e2" },
    concept:       { ink: "#7c3aed", bg: "#f3edfd" },
    noteworthy:    { ink: "#be123c", bg: "#fdecef" },
    artifact:      { ink: "#1d4ed8", bg: "#e8effc" },
    apex:          { ink: "#34322e", bg: "#34322e" },
    edge: "#c4c0b8", apexedge: "#cfccc5", relates: "#9b8cc0", sel: "#b4530a",
  };

  // ---------- index everything by id ----------
  const ent = new Map();
  const add = (e) => { if (e && e.id) ent.set(e.id, e); };
  add(K.project);
  for (const g of ["nodes","concepts","noteworthy","artifacts","waypoints"]) (K[g]||[]).forEach(add);

  const nodeIds = new Set((K.nodes||[]).map(n => n.id));
  const edges = K.edges || [];
  const decomposes = edges.filter(e => e.kind === "decomposes" && nodeIds.has(e.from.id) && nodeIds.has(e.to.id));

  const SAT_KIND = { mentions: "concept", notes: "noteworthy", produces: "artifact" };
  const satByOwner = new Map();           // ownerNodeId -> [{id, kind, type}]
  const satIds = new Set();
  for (const e of edges) {
    if (!SAT_KIND[e.kind]) continue;
    if (!nodeIds.has(e.from.id)) continue;
    const t = ent.get(e.to.id); if (!t) continue;
    if (!satByOwner.has(e.from.id)) satByOwner.set(e.from.id, []);
    satByOwner.get(e.from.id).push({ id: e.to.id, kind: e.kind, type: SAT_KIND[e.kind] });
    satIds.add(e.to.id);
  }
  for (const arr of satByOwner.values()) arr.sort((a,b) => a.id < b.id ? -1 : 1);
  const relates = edges.filter(e => e.kind === "relates" && satIds.has(e.from.id) && satIds.has(e.to.id));

  // ---------- decomposes structure: parents/children + longest-path rank (for visibility) ----------
  const parents = new Map(), children = new Map();
  for (const id of nodeIds) { parents.set(id, []); children.set(id, []); }
  for (const e of decomposes) { children.get(e.from.id).push(e.to.id); parents.get(e.to.id).push(e.from.id); }
  const rankMemo = new Map();
  function rank(id, stack) {
    if (rankMemo.has(id)) return rankMemo.get(id);
    stack = stack || new Set();
    if (stack.has(id)) return 0;
    stack.add(id);
    const ps = parents.get(id) || [];
    const r = ps.length ? 1 + Math.max(...ps.map(p => rank(p, stack))) : 0;
    stack.delete(id); rankMemo.set(id, r); return r;
  }
  const rootGoals = [...nodeIds].filter(id => (parents.get(id) || []).length === 0).sort();

  // ---------- helpers shared with the detail panel ----------
  function labelOf(e) { return e ? (e.title || e.label || e.name || e.id) : "?"; }
  function typeColor(e) {
    if (!e) return C.apex;
    const key = e.entityType === "node" ? e.type : e.entityType;
    return C[key] || C.apex;
  }
  function hasMore(id) {
    return (children.get(id) || []).length > 0 || (satByOwner.get(id) || []).length > 0;
  }

  // ---------- build the cytoscape graph (every entity once; visibility is toggled later) ----------
  const elements = [];
  const apexId = K.project ? K.project.id : "__apex__";
  elements.push({ data: { id: apexId, base: "konspekt", label: "konspekt" }, classes: "apex" });
  for (const id of nodeIds) {
    const e = ent.get(id);
    elements.push({ data: { id, base: labelOf(e), label: labelOf(e), kicker: e.type }, classes: "spine " + e.type });
  }
  for (const sid of satIds) {
    const e = ent.get(sid);
    elements.push({ data: { id: sid, base: labelOf(e), label: labelOf(e) }, classes: "sat " + e.entityType });
  }
  for (const g of rootGoals) elements.push({ data: { id: "apex>" + g, source: apexId, target: g }, classes: "apexedge" });
  for (const e of decomposes) elements.push({ data: { id: "dec>" + e.from.id + ">" + e.to.id, source: e.from.id, target: e.to.id }, classes: "decomposes" });
  for (const [owner, arr] of satByOwner)
    for (const t of arr) elements.push({ data: { id: "teth>" + owner + ">" + t.id, source: owner, target: t.id }, classes: "tether " + t.kind });
  for (const e of relates) elements.push({ data: { id: "rel>" + e.from.id + ">" + e.to.id, source: e.from.id, target: e.to.id }, classes: "relates" });

  // ---------- cytoscape ----------
  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements,
    minZoom: 0.15, maxZoom: 3, wheelSensitivity: 0.25,
    boxSelectionEnabled: false, autoungrabify: true,
    style: [
      { selector: "node", style: {
        "label": "data(label)", "text-wrap": "wrap", "text-max-width": "132px",
        "text-valign": "center", "text-halign": "center",
        "font-family": "ui-sans-serif, Segoe UI, Roboto, Helvetica, Arial, sans-serif",
        "font-size": "11px", "font-weight": 550, "line-height": 1.2,
        "shape": "round-rectangle", "background-color": "#fff",
        "border-width": 1.4, "border-color": C.edge, "color": C.ink || "#1c1b19",
        "width": "label", "height": "label", "padding": "11px",
        "text-outline-width": 0, "transition-property": "opacity", "transition-duration": "120ms",
      }},
      { selector: ".goal",          style: { "border-color": C.goal.ink } },
      { selector: ".investigation", style: { "border-color": C.investigation.ink } },
      { selector: ".task",          style: { "border-color": C.task.ink } },
      { selector: ".sat", style: { "font-size": "10px", "padding": "8px", "text-max-width": "118px" } },
      { selector: ".concept",    style: { "background-color": C.concept.bg,    "border-color": C.concept.ink,    "color": C.concept.ink,    "shape": "round-rectangle" } },
      { selector: ".noteworthy", style: { "background-color": C.noteworthy.bg, "border-color": C.noteworthy.ink, "color": C.noteworthy.ink } },
      { selector: ".artifact",   style: { "background-color": C.artifact.bg,   "border-color": C.artifact.ink,   "color": C.artifact.ink } },
      { selector: ".apex", style: {
        "background-color": C.apex.bg, "border-color": C.apex.ink, "color": "#fff",
        "font-weight": 650, "shape": "round-rectangle", "padding": "9px",
      }},
      { selector: "edge", style: {
        "curve-style": "bezier", "width": 1.4, "line-color": C.edge,
        "target-arrow-shape": "none", "transition-property": "opacity", "transition-duration": "120ms",
      }},
      { selector: ".apexedge", style: { "line-color": C.apexedge, "line-style": "dashed", "width": 1.3 } },
      { selector: ".tether",          style: { "line-style": "dashed", "opacity": 0.6, "width": 1.2 } },
      { selector: ".tether.mentions", style: { "line-color": C.concept.ink } },
      { selector: ".tether.notes",    style: { "line-color": C.noteworthy.ink } },
      { selector: ".tether.produces", style: { "line-color": C.artifact.ink } },
      { selector: ".relates", style: { "curve-style": "unbundled-bezier", "control-point-distances": [-32], "line-color": C.relates, "line-style": "dotted", "width": 1.4 } },
      { selector: ".sel", style: { "border-width": 3, "border-color": C.sel } },
      { selector: ".faded", style: { "opacity": 0.18 } },
    ],
  });

  // ---------- state + visibility ----------
  const expanded = new Set();
  let selected = null;

  // apex is always shown; a root goal is always shown; any other spine node is
  // shown iff a parent is shown AND expanded; a satellite is shown iff an owner
  // is shown AND expanded. (Edges hide automatically when an endpoint hides.)
  function computeVisible() {
    const vis = new Set([apexId]);
    const order = [...nodeIds].sort((a, b) => rank(a) - rank(b) || (a < b ? -1 : 1));
    for (const id of order) {
      const ps = parents.get(id) || [];
      if (!ps.length) { vis.add(id); continue; }
      if (ps.some(p => vis.has(p) && expanded.has(p))) vis.add(id);
    }
    for (const [owner, arr] of satByOwner)
      if (vis.has(owner) && expanded.has(owner)) for (const t of arr) vis.add(t.id);
    return vis;
  }

  function refreshLabels() {
    cy.batch(() => {
      for (const id of nodeIds) {
        const n = cy.getElementById(id); if (n.empty()) continue;
        const base = n.data("base");
        if (!hasMore(id)) { n.data("label", base); continue; }
        const hidden = (children.get(id) || []).length + (satByOwner.get(id) || []).length;
        n.data("label", base + (expanded.has(id) ? "  −" : "  +" + hidden));
      }
    });
  }

  let laidOut = false;
  function apply(fit) {
    const vis = computeVisible();
    cy.batch(() => {
      cy.nodes().forEach(n => n.style("display", vis.has(n.id()) ? "element" : "none"));
    });
    refreshLabels();
    const eles = cy.elements(":visible");
    const layout = eles.layout({
      name: "dagre", rankDir: "TB", nodeSep: 26, rankSep: 64, edgeSep: 8,
      animate: laidOut, animationDuration: 280,
      fit: fit !== false, padding: 48,
    });
    layout.run();
    laidOut = true;
  }

  // ---------- selection / highlight ----------
  function highlight(id) {
    cy.elements().removeClass("faded sel");
    if (!id) return;
    const n = cy.getElementById(id);
    if (n.empty()) return;
    const keep = n.closedNeighborhood();
    cy.elements().difference(keep).addClass("faded");
    n.addClass("sel");
  }
  function selectNode(id) { selected = id; highlight(id); renderDetail(); }

  function expandAncestors(id) {
    const stack = [id], seen = new Set();
    while (stack.length) {
      const cur = stack.pop();
      for (const p of (parents.get(cur) || [])) { expanded.add(p); if (!seen.has(p)) { seen.add(p); stack.push(p); } }
    }
  }
  function ensureVisible(id) {
    if (nodeIds.has(id)) { expandAncestors(id); return; }
    for (const [owner, arr] of satByOwner)
      if (arr.some(t => t.id === id)) { expandAncestors(owner); expanded.add(owner); break; }
  }

  cy.on("tap", "node", (evt) => {
    const id = evt.target.id();
    selectNode(id);
    if (nodeIds.has(id) && hasMore(id)) {
      if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
      apply(false);
    }
  });
  cy.on("tap", (evt) => { if (evt.target === cy) { selected = null; highlight(null); renderDetail(); } });

  // ---------- detail panel ----------
  function inlineMd(s) {
    return s.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]))
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  }
  function bodyHtml(e) {
    let b = (e.body || "").replace(/^#.*\n+/, "");
    return b.split(/\n\s*\n/).map(p => "<p>" + inlineMd(p.replace(/\n/g," ")) + "</p>").join("");
  }
  function edgesFor(id) {
    return { out: edges.filter(e => e.from.id === id), inb: edges.filter(e => e.to.id === id) };
  }
  function renderDetail() {
    const pane = document.getElementById("detailPane");
    if (!selected || !ent.has(selected)) { pane.innerHTML = "<div class='empty'>Select a node to inspect it.</div>"; return; }
    const e = ent.get(selected), col = typeColor(e);
    const chips = [];
    chips.push(`<span class="chip k" style="background:${col.ink}">${e.entityType}${e.entityType==="node"?" · "+e.type:""}</span>`);
    if (e.status) chips.push(`<span class="chip">status: ${e.status}</span>`);
    if (e.kind && e.entityType!=="node") chips.push(`<span class="chip">${e.kind}</span>`);
    if (e.review) chips.push(`<span class="chip">review: ${e.review}</span>`);
    if (e.version) chips.push(`<span class="chip">${e.version}</span>`);
    if (Array.isArray(e.aliases) && e.aliases.length) chips.push(`<span class="chip">aka: ${e.aliases.join(", ")}</span>`);

    const prov = e.provenance || {};
    const provBits = [];
    if (prov.conversationId) provBits.push(`conversation <b>${prov.conversationId}</b>`);
    if (prov.confidence != null) provBits.push(`confidence <b>${prov.confidence}</b>`);
    if (e.location) provBits.push(`@ <b>${e.location}</b>`);

    const { out, inb } = edgesFor(selected);
    const erow = (e2, dir) => {
      const other = dir==="out" ? e2.to.id : e2.from.id;
      const oe = ent.get(other);
      return `<div class="erow"><span class="ek">${e2.kind}</span>` +
        `<a data-go="${other}">${dir==="out"?"→":"←"} ${oe ? labelOf(oe) : other}</a></div>`;
    };

    pane.innerHTML =
      `<div class="d-kicker">${e.id}</div>` +
      `<div class="d-title">${labelOf(e)}</div>` +
      `<div class="chips">${chips.join("")}</div>` +
      `<div class="d-body">${bodyHtml(e)}</div>` +
      (provBits.length ? `<div class="d-sec"><h4>Provenance</h4><div class="meta-kv">${provBits.join(" · ")}</div></div>` : "") +
      (out.length ? `<div class="d-sec"><h4>Outbound (${out.length})</h4>${out.map(x=>erow(x,"out")).join("")}</div>` : "") +
      (inb.length ? `<div class="d-sec"><h4>Inbound (${inb.length})</h4>${inb.map(x=>erow(x,"in")).join("")}</div>` : "");

    pane.querySelectorAll("[data-go]").forEach(a => a.addEventListener("click", () => goTo(a.dataset.go)));
  }

  function goTo(id) {
    if (!ent.has(id)) return;
    ensureVisible(id);
    apply(false);
    selectNode(id);
    const n = cy.getElementById(id);
    if (n.nonempty()) cy.animate({ center: { eles: n }, zoom: Math.max(cy.zoom(), 0.9) }, { duration: 300 });
  }

  // ---------- problems panel ----------
  function renderProblems() {
    const pane = document.getElementById("problemsPane");
    const probs = K.problems || [];
    document.getElementById("probCount").textContent = probs.length;
    if (probs.some(p => p.severity === "error")) document.getElementById("probCount").classList.add("err");
    if (!probs.length) { pane.innerHTML = "<div class='empty'>No conformance problems. ✓</div>"; return; }
    pane.innerHTML = probs.map(p =>
      `<div class="prob ${p.severity}"><div class="code">${p.code}</div>` +
      `<div class="msg">${inlineMd(p.message)}</div>` +
      (p.ref && ent.has(p.ref) ? `<div class="msg"><span class="ref" data-go="${p.ref}">→ ${p.ref}</span></div>` : "") +
      `</div>`).join("");
    pane.querySelectorAll("[data-go]").forEach(a => a.addEventListener("click", () => { switchTab("detail"); goTo(a.dataset.go); }));
  }

  // ---------- tabs ----------
  function switchTab(name) {
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("on", t.dataset.tab===name));
    document.getElementById("detailPane").style.display = name==="detail" ? "" : "none";
    document.getElementById("problemsPane").style.display = name==="problems" ? "" : "none";
  }
  document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => switchTab(t.dataset.tab)));

  // ---------- controls ----------
  document.getElementById("btnFit").addEventListener("click", () => cy.animate({ fit: { padding: 48 } }, { duration: 250 }));
  document.getElementById("btnCollapse").addEventListener("click", () => { expanded.clear(); apply(true); });
  document.getElementById("btnExpand").addEventListener("click", () => {
    for (const id of nodeIds) if (hasMore(id)) expanded.add(id);
    apply(true);
  });
  const search = document.getElementById("search");
  search.addEventListener("keydown", (ev) => {
    if (ev.key !== "Enter") return;
    const q = search.value.trim().toLowerCase(); if (!q) return;
    let hit = null;
    for (const e of ent.values()) {
      if (e.id === apexId) continue;
      const hay = (e.id + " " + labelOf(e) + " " + (e.aliases||[]).join(" ")).toLowerCase();
      if (hay.includes(q)) { hit = e.id; break; }
    }
    if (hit) goTo(hit);
  });

  // ---------- legend ----------
  document.getElementById("legend").innerHTML =
    [["goal","Goal"],["investigation","Investigation"],["task","Task"],
     ["concept","Concept"],["noteworthy","Noteworthy"],["artifact","Artifact"]]
    .map(([c,l]) => `<div class="row"><span class="sw" style="background:${C[c].bg};border-color:${C[c].ink}"></span>${l}</div>`).join("");

  // ---------- boot ----------
  document.getElementById("projectGoal").textContent = K.project ? K.project.goal : "";
  renderProblems();
  apply(true);          // starts collapsed to the root goals, then fits
})();
</script>
</body>
</html>
