# konspekt component manifest — conformance
#
# Runs lib/validate.mjs in CI so instance drift fails a build instead of being
# discovered by hand a month later. This is R8 in spec/architecture/SCHEMA-RECONCILIATION.md:
# the recurring failure was never a wrong conclusion, it was a sample someone
# stopped taking.
#
# NOT part of the konspekt standard. An instance with no CI is fully conformant
# and fully portable (nw-components-are-not-the-standard).

id: conformance
title: Conformance CI
binding: github
summary: Run the konspekt conformance checker on every push and pull request
  that touches the instance, and fail the build on errors.

# Permissions the INSTALL needs, not the component's runtime.
#   workflows  writes under .github/workflows/. A GitHub App or MCP connector
#              without the `workflows` scope can create the file locally but
#              cannot push it. Install this component from a terminal.
requires: [workflows]

# Repo files this component calls at runtime. Unlike notify, this component is
# not self-contained: the workflow shells out to the checker rather than
# vendoring a copy of it, because a vendored copy is exactly the drift this
# component exists to catch (nw-derive-not-copy). --add refuses if these are
# absent rather than installing a workflow that cannot run.
needs:
  - lib/validate.mjs
  - lib/conformance.mjs

files:
  - from: workflow.yml
    to: .github/workflows/konspekt-conformance.yml

next: |
  1. Commit and push. The check runs on any push or PR touching
     .konspekt/instance/**.
  2. Run it locally the same way CI does:
       node lib/validate.mjs .konspekt/instance
  3. It fails on errors only. To gate on warnings too, add --strict to the
     workflow's validate step — expect that to be red until the schema
     reconciliation (spec/architecture/SCHEMA-RECONCILIATION.md) is closed.
