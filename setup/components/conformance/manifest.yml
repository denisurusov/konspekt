# konspekt component manifest — conformance
#
# Runs the konspekt conformance checker in CI so instance drift fails a build
# instead of being discovered by hand a month later. This is R8 in
# spec/architecture/SCHEMA-RECONCILIATION.md: the recurring failure was never a
# wrong conclusion, it was a sample someone stopped taking.
#
# NOT part of the konspekt standard. An instance with no CI is fully conformant
# and fully portable (nw-components-are-not-the-standard).

id: conformance
title: Conformance CI
binding: github
summary: Run the konspekt conformance checker on every push and pull request
  that touches the instance, and fail the build on errors.

# Permissions the INSTALL needs, not the component's runtime.
#   workflows  writes under .github/workflows/. Verified 2026-07-20: a GitHub
#              App or MCP connector without the `workflows` scope gets
#              403 "Resource not accessible by integration" on the PUSH — the
#              local write succeeds. Install this component from a terminal.
requires: [workflows]

# The checker travels WITH the component rather than being assumed present.
#
# `from` is resolved relative to this manifest, so these reach up into
# konspekt's own lib/ — which stays the single root. What lands in an adopter's
# repo is a projection of it, regenerated by --add conformance --force and
# watched by --check.
#
# This is deliberate and slightly subtle: the alternative was to declare lib/ a
# prerequisite and refuse without it, which would have forced every adopter to
# hand-vendor the checker. A hand-vendored checker forks, and a forked
# conformance checker is precisely the drift this component exists to catch
# (nw-derive-not-copy). Installing into konspekt itself is a self-identical
# no-op.
files:
  - from: ../../../lib/conformance.mjs
    to: lib/conformance.mjs
  - from: ../../../lib/validate.mjs
    to: lib/validate.mjs
  - from: workflow.yml
    to: .github/workflows/konspekt-conformance.yml

next: |
  1. Commit and push. The check runs on any push or PR touching
     .konspekt/instance/**.
  2. Run it locally the same way CI does:
       node lib/validate.mjs .konspekt/instance
  3. It fails on errors only. To gate on warnings too, add --strict to the
     workflow's validate step — expect that to be red until the schema
     reconciliation is closed.
