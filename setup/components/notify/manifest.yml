# konspekt component manifest — notify
#
# A component is an optional add-on to an existing .konspekt/ instance. It is
# NOT part of the konspekt standard: a conformant instance with no components
# is complete, and the manual re-upload probe passes without any of them.
#
# The manifest is read by setup/init.mjs. Keep it flat and boring — the parser
# is deliberately not a YAML parser.

id: notify
title: Change notifications
binding: github
summary: Watch the instance for accepted, proposed, and superseded entities and
  report them by opening a GitHub issue assigned to the subscribers.

# Permissions the INSTALL needs, not the component's runtime.
#   workflows  writes under .github/workflows/. A GitHub App or MCP connector
#              without the `workflows` scope can create the file locally but
#              cannot push it — the push is rejected, not the write. Install
#              this component from a terminal.
requires: [workflows]

# from: path relative to this manifest.  to: path relative to the repo root.
# seed: true means "write once, never overwrite" — it is the adopter's config,
# not a projection of the template. Everything else is a projection and is
# regenerated by --add notify --force.
files:
  - from: notify.yml
    to: .konspekt/notify.yml
    seed: true
  - from: konspekt-notify.mjs
    to: .github/scripts/konspekt-notify.mjs
  - from: workflow.yml
    to: .github/workflows/konspekt-notify.yml

next: |
  1. Edit .konspekt/notify.yml — subscriptions are empty, so nothing fires yet.
  2. Commit and push. The workflow runs on push to main touching the instance.
  3. Dry run without waiting for a push:
       node .github/scripts/konspekt-notify.mjs HEAD~1 HEAD
